interface:
  display_name: "大众点评取号 Skill"
  short_description: "解析取号页、读取排队桌数并执行大众点评取号流程"
  default_prompt: "当用户要大众点评取号、查看排队桌数、按阈值取号或取号后提醒时，按 SKILL.md 的决策表和命令执行。用户只给店名或地址时，先查缓存，缓存缺失后用内置浏览器搜索脚本返回候选；多个候选时只让用户回复编号，再用 confirm-search 写缓存。状态脚本只做单次读取；定时唤醒由 agent 所在环境负责；阈值取号和取号后提醒都必须先确认检查频率；未达到阈值时静默结束。不要直接调用最终取号请求，不要绕过正常浏览器页面流程。"
